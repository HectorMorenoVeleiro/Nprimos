<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>100 Primeros Números Primos</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem;
    }

    .container {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border-radius: 2rem;
      padding: 2.5rem;
      max-width: 960px;
      width: 100%;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #f093fb, #f5576c, #4facfe);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }

    header p {
      color: rgba(255, 255, 255, 0.6);
      margin-top: 0.5rem;
      font-size: 1rem;
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 12px;
    }

    footer {
      text-align: center;
      margin-top: 2rem;
      color: rgba(255, 255, 255, 0.3);
      font-size: 0.85rem;
    }

    @media (max-width: 600px) {
      body { padding: 1rem; }
      .container { padding: 1.5rem; }
      h1 { font-size: 1.8rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Números Primos</h1>
      <p>Los primeros 100 números primos — <span id="hoverPrime">pasa el ratón sobre un número</span></p>
    </header>
    <canvas id="primeCanvas"></canvas>
    <footer>Hecho con ❤️</footer>
  </div>
  <script>
    function isPrime(n) {
      if (n < 2) return false;
      if (n === 2) return true;
      if (n % 2 === 0) return false;
      for (let i = 3; i * i <= n; i += 2) {
        if (n % i === 0) return false;
      }
      return true;
    }

    const primes = [];
    let num = 2;
    while (primes.length < 100) {
      if (isPrime(num)) primes.push(num);
      num++;
    }

    const canvas = document.getElementById('primeCanvas');
    const ctx = canvas.getContext('2d');
    const hoverSpan = document.getElementById('hoverPrime');

    const COLS = 10;
    const ROWS = 10;
    const PAD = 16;
    const GAP = 10;
    const CARD_W = 76;
    const CARD_H = 54;
    const RADIUS = 10;

    const W = COLS * CARD_W + (COLS - 1) * GAP + 2 * PAD;
    const H = ROWS * CARD_H + (ROWS - 1) * GAP + 2 * PAD;

    canvas.width = W * devicePixelRatio;
    canvas.height = H * devicePixelRatio;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    canvas.style.margin = '0 auto';
    ctx.scale(devicePixelRatio, devicePixelRatio);

    let hoveredIdx = -1;
    let mouseX = -1;
    let mouseY = -1;

    function getCardRect(idx) {
      const col = idx % COLS;
      const row = Math.floor(idx / COLS);
      const x = PAD + col * (CARD_W + GAP);
      const y = PAD + row * (CARD_H + GAP);
      return { x, y, w: CARD_W, h: CARD_H };
    }

    function hitTest(mx, my) {
      for (let i = 0; i < primes.length; i++) {
        const r = getCardRect(i);
        if (mx >= r.x && mx <= r.x + r.w && my >= r.y && my <= r.y + r.h) {
          return i;
        }
      }
      return -1;
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);

      for (let i = 0; i < primes.length; i++) {
        const r = getCardRect(i);
        const isHovered = i === hoveredIdx;

        if (isHovered) {
          roundRect(ctx, r.x, r.y, r.w, r.h, RADIUS);
          ctx.fillStyle = 'rgba(255,255,255,0.18)';
          ctx.fill();
          ctx.shadowColor = 'rgba(79,172,254,0.35)';
          ctx.shadowBlur = 20;
          ctx.strokeStyle = 'rgba(79,172,254,0.5)';
          ctx.lineWidth = 1.5;
          ctx.stroke();
          ctx.shadowBlur = 0;

          roundRect(ctx, r.x - 2, r.y - 2, r.w + 4, r.h + 4, RADIUS + 2);
          ctx.fillStyle = 'rgba(79,172,254,0.08)';
          ctx.fill();
        } else if (i % 2 === 1) {
          roundRect(ctx, r.x, r.y, r.w, r.h, RADIUS);
          ctx.fillStyle = 'rgba(255,255,255,0.06)';
          ctx.fill();
          ctx.strokeStyle = 'rgba(255,255,255,0.06)';
          ctx.lineWidth = 1;
          ctx.stroke();
        } else {
          roundRect(ctx, r.x, r.y, r.w, r.h, RADIUS);
          ctx.fillStyle = 'rgba(255,255,255,0.04)';
          ctx.fill();
          ctx.strokeStyle = 'rgba(255,255,255,0.04)';
          ctx.lineWidth = 1;
          ctx.stroke();
        }

        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.font = isHovered
          ? 'bold 18px "Segoe UI",system-ui,sans-serif'
          : '600 16px "Segoe UI",system-ui,sans-serif';
        ctx.fillStyle = isHovered ? '#ffffff' : '#e8e8e8';
        ctx.fillText(String(primes[i]), r.x + r.w / 2, r.y + r.h / 2);
      }
    }

    canvas.addEventListener('mousemove', (e) => {
      const rect = canvas.getBoundingClientRect();
      const scaleX = W / rect.width;
      const scaleY = H / rect.height;
      const mx = (e.clientX - rect.left) * scaleX;
      const my = (e.clientY - rect.top) * scaleY;
      const idx = hitTest(mx, my);
      if (idx !== hoveredIdx) {
        hoveredIdx = idx;
        hoverSpan.textContent = idx !== -1
          ? `#${idx + 1} — ${primes[idx]}`
          : 'pasa el ratón sobre un número';
        draw();
      }
    });

    canvas.addEventListener('mouseleave', () => {
      hoveredIdx = -1;
      hoverSpan.textContent = 'pasa el ratón sobre un número';
      draw();
    });

    draw();
  </script>
</body>
</html>
